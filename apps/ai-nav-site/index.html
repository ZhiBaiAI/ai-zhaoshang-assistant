<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>装修商家 AI 选型指南</title>
    <meta
      name="description"
      content="面向建材、装修、家居、装企老板的 AI 工具导航，按外呼获客、语音纪要、视频获客、家装设计和智能客服整理。"
    >
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-layout">
      <aside class="app-sidebar" aria-label="侧边栏">
        <div class="sidebar-header">
          <a class="brand" href="#top" aria-label="装修工具库首页">
            <span class="logo-mark" aria-hidden="true">圆</span>
            <div class="brand-text">
              <strong>圆隆科技</strong>
              <small>装修 AI 工具库</small>
            </div>
          </a>
        </div>
        <div id="scenarios" class="sidebar-nav" aria-label="场景筛选">
          <div id="categoryFilters" class="filter-list"></div>
        </div>
      </aside>

      <main id="top" class="app-main">
        <div class="main-header">
          <div class="mobile-brand" aria-label="圆隆科技">
            <span class="logo-mark" aria-hidden="true">圆</span>
            <span>圆隆科技</span>
          </div>
          <h1 id="tools-title">装修 AI 工具库</h1>
          <p class="main-subtitle">按经营场景整理，方便老板快速找到能直接试用的工具。</p>
        </div>

        <div class="results-panel">
          <div id="resultSummary" class="result-summary" aria-live="polite"></div>
          <div id="toolGrid" class="tool-grid"></div>
          <div id="mobileGroups" class="mobile-groups"></div>
        </div>

        <footer class="site-footer">
          <div>
            <strong>圆隆科技</strong>
            <span>为建材、装修、家居商家整理可落地的 AI 工具。</span>
          </div>
          <p>© 2026 圆隆科技 版权所有</p>
        </footer>
      </main>
    </div>

    <dialog id="toolDialog" class="tool-dialog" aria-labelledby="dialogTitle">
      <div class="dialog-body">
        <button id="closeDialog" class="dialog-close" type="button" aria-label="关闭">×</button>
        <div id="dialogContent"></div>
      </div>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
