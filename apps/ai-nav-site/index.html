<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>装修商家 AI 选型指南</title>
    <meta
      name="description"
      content="面向建材、装修、家居、装企老板的 AI 选型指南，按效果图、选材料、预算、施工、营销、客服等经营场景整理。"
    >
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top" aria-label="装修商家 AI 选型指南首页">
        <span class="brand-mark" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </span>
        <span>
          <strong>装修商家 AI 工具库</strong>
          <small>按业务问题选工具</small>
        </span>
      </a>
    </header>

    <main id="top">
      <section id="tools" class="catalog" aria-labelledby="tools-title">
        <div class="catalog-head">
          <div class="catalog-copy">
            <p class="eyebrow">装修行业 AI 工具</p>
            <h1 id="tools-title">AI 工具导航</h1>
            <p class="lead">按门店、装企、设计和获客场景整理，先看能直接用起来的工具。</p>
          </div>
        </div>
        <div class="catalog-shell">
          <aside id="scenarios" class="filter-wrap" aria-label="场景筛选">
            <p class="filter-title">经营场景</p>
            <div id="categoryFilters" class="filter-list"></div>
          </aside>
          <div class="results-panel">
            <div id="resultSummary" class="result-summary" aria-live="polite"></div>
            <div id="toolGrid" class="tool-grid"></div>
          </div>
        </div>
      </section>
    </main>

    <dialog id="toolDialog" class="tool-dialog" aria-labelledby="dialogTitle">
      <div class="dialog-body">
        <button id="closeDialog" class="dialog-close" type="button" aria-label="关闭">×</button>
        <div id="dialogContent"></div>
      </div>
    </dialog>

    <footer class="site-footer">
      <p>装修商家 AI 选型指南</p>
      <span>工具费用、试用额度和服务范围，请以各平台官网说明为准。</span>
    </footer>

    <script src="./app.js"></script>
  </body>
</html>
