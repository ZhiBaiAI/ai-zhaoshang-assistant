<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>装修商家 AI 选型指南</title>
    <meta
      name="description"
      content="面向建材、装修、家居、装企老板的 AI 选型指南，按效果图、选材料、预算、施工、营销、客服等经营场景整理。"
    >
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top" aria-label="装修商家 AI 选型指南首页">
        <span class="brand-mark" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </span>
        <span>
          <strong>装修商家 AI 工具库</strong>
          <small>按业务问题选工具</small>
        </span>
      </a>
      <nav class="top-nav" aria-label="页面导航">
        <a href="#tools">工具</a>
        <a href="#scenarios">场景</a>
        <a href="#steps">落地顺序</a>
      </nav>
    </header>

    <main id="top">
      <section id="tools" class="catalog" aria-labelledby="tools-title">
        <div class="catalog-head">
          <div class="catalog-copy">
            <p class="eyebrow">装修行业 AI 工具</p>
            <h1 id="tools-title">按经营场景选 AI 工具</h1>
            <p class="lead">面向门店、装企、设计师和获客团队，把常用 AI 工具按实际工作分类整理。</p>
          </div>
        </div>
        <div id="scenarios" class="filter-wrap">
          <div id="categoryFilters" class="filter-list" aria-label="场景筛选"></div>
        </div>
        <div id="resultSummary" class="result-summary" aria-live="polite"></div>
        <div id="toolGrid" class="tool-grid"></div>
      </section>

      <section id="steps" class="steps-section" aria-labelledby="steps-title">
        <div class="section-heading">
          <p class="eyebrow">建议的落地顺序</p>
          <h2 id="steps-title">让团队先看到实际变化</h2>
        </div>
        <div class="steps-grid">
          <article>
            <span>1</span>
            <h3>先把展示做快</h3>
            <p>用真实户型、门店照片或样板间，先把效果图和材料展示做得更直观。</p>
          </article>
          <article>
            <span>2</span>
            <h3>再把沟通做快</h3>
            <p>把常见咨询、报价解释、活动话术和短视频内容先交给 AI 提升效率。</p>
          </article>
          <article>
            <span>3</span>
            <h3>最后再接流程</h3>
            <p>当团队已经确认有效，再决定是否接报价、施工、客服系统和供应链流程。</p>
          </article>
        </div>
      </section>
    </main>

    <dialog id="toolDialog" class="tool-dialog" aria-labelledby="dialogTitle">
      <div class="dialog-body">
        <button id="closeDialog" class="dialog-close" type="button" aria-label="关闭">×</button>
        <div id="dialogContent"></div>
      </div>
    </dialog>

    <footer class="site-footer">
      <p>装修商家 AI 选型指南</p>
      <span>工具费用、试用额度和服务范围，请以各平台官网说明为准。</span>
    </footer>

    <script src="./app.js"></script>
  </body>
</html>
