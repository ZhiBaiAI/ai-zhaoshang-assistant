<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>为建材经销商打造的智能化工作流解决方案</title>
    <meta
      name="description"
      content="为建材经销商打造的智能化工作流解决方案，覆盖 AI 外呼、AI 获客、AI 客服、AI 设计四大场景。"
    >
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <a class="brand-mark" href="#top" aria-label="圆隆科技">
          <img class="brand-logo" src="./logo.jpg" alt="">
        </a>
      </header>

      <main id="top" class="page">
        <section class="hero">
          <p class="hero-brand">圆隆科技</p>
          <h1>为建材经销商打造的智能化工作流解决方案</h1>
        </section>

        <section id="categoryView" class="category-view" aria-label="分类入口">
          <div id="categoryGrid" class="category-grid"></div>
        </section>
      </main>
    </div>

    <dialog id="categoryDialog" class="category-dialog" aria-labelledby="categoryDialogTitle">
      <div class="dialog-panel category-dialog-panel">
        <button id="closeCategoryDialog" class="dialog-close" type="button" aria-label="关闭">×</button>
        <h2 id="categoryDialogTitle" class="sr-only"></h2>
        <div id="toolGrid" class="tool-grid tool-grid-dialog"></div>
      </div>
    </dialog>

    <dialog id="appDialog" class="app-dialog" aria-labelledby="appDialogTitle">
      <div class="dialog-panel">
        <button id="closeDialog" class="dialog-close" type="button" aria-label="关闭">×</button>
        <p class="detail-eyebrow" id="appDialogTitle">移动端使用</p>
        <h3 id="appName"></h3>
        <p id="appDescription" class="detail-description"></p>
      </div>

    <script src="./app.js"></script>
